name: Bug report
description: Report a problem with Claude Orchestrator
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: Shown in the sidebar footer (e.g. 0.1.42).
    validations:
      required: false
  - type: textarea
    id: agents
    attributes:
      label: Agents involved
      description: Which agent CLIs (Claude / Gemini / Codex) and versions, if relevant.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant logs or attach screenshots.
    validations:
      required: false
